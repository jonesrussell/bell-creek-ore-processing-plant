    <script type="text/javascript">
      window.addEventListener(
        "load",
        function () {
          if (classie.has(document.getElementsByTagName("html")[0], "svg")) {
            window.mill = new SVGjsAnim("drawing");
            window.mill.preload();
            window.mill.init();
          }
        },
        false
      );
    </script>
